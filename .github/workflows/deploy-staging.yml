name: Publish to docs-staging.woolyai.com

on:
  workflow_dispatch:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout marketing-sales content
        uses: actions/checkout@v4
        with:
          repository: Wooly-AI/marketing-sales
          path: marketing-sales

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Update llms.txt from marketing-sales
        run: cp -f "marketing-sales/What Is WoolyAI.md" "static/llms.txt"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Deploy to S3
        uses: NorseGaud/aws-s3@main
        with:
          aws-region: us-west-2
          aws-s3-bucket: "woolyai-docs-staging"
          cloudfront-distribution-id: "E26M4UZJ3ZG8VN"
